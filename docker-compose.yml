services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: lifeos-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-lifeos}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      TZ: Asia/Shanghai
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - lifeos_postgres_data:/var/lib/postgresql/data
      - ./lifeos-monolith/src/main/resources/db/migration:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  redis:
    image: redis:7-alpine
    container_name: lifeos-redis
    command: redis-server --appendonly yes
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - lifeos_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  lifeos-app:
    build:
      context: ./lifeos-monolith
      dockerfile: Dockerfile
    container_name: lifeos-app
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-lifeos}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET:-your-secret-key-must-be-at-least-32-characters-long}
      ADMIN_CONSOLE_KEY: ${ADMIN_CONSOLE_KEY:-change-me-admin-key}
      DEMO_DEVICE_TOKEN_LIMIT: ${DEMO_DEVICE_TOKEN_LIMIT:-100000}
      AI_BASE_URL: ${AI_BASE_URL:-https://api.deepseek.com}
      AI_API_KEY: ${AI_API_KEY:-}
      AI_MODEL: ${AI_MODEL:-deepseek-chat}
      FEISHU_APP_ID: ${FEISHU_APP_ID:-}
      FEISHU_APP_SECRET: ${FEISHU_APP_SECRET:-}
      FEISHU_CHAT_HISTORY_LIMIT: ${FEISHU_CHAT_HISTORY_LIMIT:-80}
      FEISHU_DEMO_FALLBACK_ENABLED: ${FEISHU_DEMO_FALLBACK_ENABLED:-false}
      FEISHU_BOT_ENABLED: ${FEISHU_BOT_ENABLED:-false}
      FEISHU_BOT_LONG_CONNECTION_ENABLED: ${FEISHU_BOT_LONG_CONNECTION_ENABLED:-false}
      FEISHU_BOT_VERIFICATION_TOKEN: ${FEISHU_BOT_VERIFICATION_TOKEN:-}
      FEISHU_BOT_ENCRYPT_KEY: ${FEISHU_BOT_ENCRYPT_KEY:-}
      DIFY_BASE_URL: ${DIFY_BASE_URL:-http://host.docker.internal:5001/v1}
      DIFY_API_KEY: ${DIFY_API_KEY:-}
      DIFY_DISTILL_WORKFLOW_KEY: ${DIFY_DISTILL_WORKFLOW_KEY:-}
      DIFY_ASK_APP_KEY: ${DIFY_ASK_APP_KEY:-}
      DIFY_DEMO_MODE: ${DIFY_DEMO_MODE:-false}
    ports:
      - "${APP_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:8080/api/v3/api-docs || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  lifeos-web:
    build:
      context: ./lifeos-web
      dockerfile: Dockerfile
    container_name: lifeos-web
    ports:
      - "${WEB_PORT:-5173}:80"
    depends_on:
      - lifeos-app

volumes:
  lifeos_postgres_data:
  lifeos_redis_data:
