services:
  mysql:
    image: mysql:8.0.40
    container_name: lifeos-mysql
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD:-123}"
      MYSQL_DATABASE: "${MYSQL_DATABASE:-lifeos}"
      TZ: Asia/Shanghai
    ports:
      - "${MYSQL_PORT:-13306}:3306"
    volumes:
      - lifeos_mysql_data:/var/lib/mysql
      - ./lifeos-backend/db/lifeos.sql:/docker-entrypoint-initdb.d/001-lifeos.sql:ro
      - ./lifeos-backend/db/seeds/reset_test_data.sql:/docker-entrypoint-initdb.d/002-reset-test-data.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-123}"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 20s

  redis:
    image: redis:7.2
    container_name: lifeos-redis
    command:
      - redis-server
      - --appendonly
      - "yes"
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - lifeos_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  nacos:
    image: nacos/nacos-server:v2.3.2
    container_name: lifeos-nacos
    environment:
      MODE: standalone
      PREFER_HOST_MODE: hostname
      NACOS_AUTH_ENABLE: "false"
      JVM_XMS: 256m
      JVM_XMX: 256m
      JVM_XMN: 128m
    ports:
      - "${NACOS_PORT:-8848}:8848"
      - "${NACOS_GRPC_PORT:-9848}:9848"
    volumes:
      - lifeos_nacos_logs:/home/nacos/logs
      - lifeos_nacos_data:/home/nacos/data
    healthcheck:
      test: ["CMD-SHELL", "echo > /dev/tcp/127.0.0.1/8848"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  rocketmq-namesrv:
    image: apache/rocketmq:5.3.2
    container_name: lifeos-rocketmq-namesrv
    user: "0:0"
    command: sh mqnamesrv
    environment:
      JAVA_OPT_EXT: "-server -Xms256m -Xmx256m -Xmn128m"
    ports:
      - "${ROCKETMQ_NAMESRV_PORT:-9876}:9876"
    volumes:
      - lifeos_rocketmq_namesrv_logs:/home/rocketmq/logs
    healthcheck:
      test: ["CMD", "bash", "-lc", "echo > /dev/tcp/127.0.0.1/9876"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s

  rocketmq-broker:
    image: apache/rocketmq:5.3.2
    container_name: lifeos-rocketmq-broker
    user: "0:0"
    command: sh mqbroker -n rocketmq-namesrv:9876 -c /home/rocketmq/broker.conf
    environment:
      JAVA_OPT_EXT: "-server -Xms512m -Xmx512m -Xmn256m"
    depends_on:
      rocketmq-namesrv:
        condition: service_healthy
    ports:
      - "${ROCKETMQ_BROKER_PORT:-10911}:10911"
    volumes:
      - ./lifeos-backend/docker/rocketmq/broker.conf:/home/rocketmq/broker.conf:ro
      - lifeos_rocketmq_broker_logs:/home/rocketmq/logs
      - lifeos_rocketmq_broker_store:/home/rocketmq/store
    healthcheck:
      test: ["CMD", "bash", "-lc", "echo > /dev/tcp/127.0.0.1/10911"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  lifeos-user-service:
    build:
      context: ./lifeos-backend
      dockerfile: Dockerfile
      args:
        SERVICE_MODULE: lifeos-user-service
    container_name: lifeos-user-service
    environment:
      LIFEOS_USER_SERVICE_PORT: 8081
      MYSQL_JDBC_URL: "jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-lifeos}?${MYSQL_JDBC_PARAMS:-useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai}"
      MYSQL_USERNAME: root
      MYSQL_PASSWORD: "${MYSQL_ROOT_PASSWORD:-123}"
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DATABASE: "${REDIS_DATABASE:-0}"
      NACOS_SERVER_ADDR: nacos:8848
      LIFEOS_JWT_SECRET: "${LIFEOS_JWT_SECRET:-replace-with-a-32-plus-char-secret}"
      LIFEOS_JWT_EXPIRATION_MS: "${LIFEOS_JWT_EXPIRATION_MS:-86400000}"
      WAIT_FOR_HOSTS: mysql:3306,redis:6379,nacos:8848
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      nacos:
        condition: service_healthy

  lifeos-task-service:
    build:
      context: ./lifeos-backend
      dockerfile: Dockerfile
      args:
        SERVICE_MODULE: lifeos-task-service
    container_name: lifeos-task-service
    environment:
      LIFEOS_TASK_SERVICE_PORT: 8082
      MYSQL_JDBC_URL: "jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-lifeos}?${MYSQL_JDBC_PARAMS:-useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai}"
      MYSQL_USERNAME: root
      MYSQL_PASSWORD: "${MYSQL_ROOT_PASSWORD:-123}"
      REDIS_HOST: redis
      REDIS_PORT: 6379
      NACOS_SERVER_ADDR: nacos:8848
      ROCKETMQ_NAMESRV_ADDR: rocketmq-namesrv:9876
      WAIT_FOR_HOSTS: mysql:3306,redis:6379,nacos:8848,rocketmq-namesrv:9876
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      nacos:
        condition: service_healthy
      rocketmq-namesrv:
        condition: service_healthy
      rocketmq-broker:
        condition: service_healthy

  lifeos-note-service:
    build:
      context: ./lifeos-backend
      dockerfile: Dockerfile
      args:
        SERVICE_MODULE: lifeos-note-service
    container_name: lifeos-note-service
    environment:
      LIFEOS_NOTE_SERVICE_PORT: 8083
      MYSQL_JDBC_URL: "jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-lifeos}?${MYSQL_JDBC_PARAMS:-useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai}"
      MYSQL_USERNAME: root
      MYSQL_PASSWORD: "${MYSQL_ROOT_PASSWORD:-123}"
      NACOS_SERVER_ADDR: nacos:8848
      ROCKETMQ_NAMESRV_ADDR: rocketmq-namesrv:9876
      LIFEOS_FEISHU_BASE_URL: "${LIFEOS_FEISHU_BASE_URL:-https://open.feishu.cn/open-apis}"
      LIFEOS_FEISHU_APP_ID: "${LIFEOS_FEISHU_APP_ID:-}"
      LIFEOS_FEISHU_APP_SECRET: "${LIFEOS_FEISHU_APP_SECRET:-}"
      WAIT_FOR_HOSTS: mysql:3306,nacos:8848,rocketmq-namesrv:9876
    depends_on:
      mysql:
        condition: service_healthy
      nacos:
        condition: service_healthy
      rocketmq-namesrv:
        condition: service_healthy
      rocketmq-broker:
        condition: service_healthy

  lifeos-ai-service:
    build:
      context: ./lifeos-backend
      dockerfile: Dockerfile
      args:
        SERVICE_MODULE: lifeos-ai-service
    container_name: lifeos-ai-service
    environment:
      LIFEOS_AI_SERVICE_PORT: 8084
      NACOS_SERVER_ADDR: nacos:8848
      ROCKETMQ_NAMESRV_ADDR: rocketmq-namesrv:9876
      LIFEOS_AI_BASE_URL: "${LIFEOS_AI_BASE_URL:-https://api.deepseek.com}"
      LIFEOS_AI_API_KEY: "${LIFEOS_AI_API_KEY:-}"
      LIFEOS_AI_MODEL: "${LIFEOS_AI_MODEL:-deepseek-chat}"
      WAIT_FOR_HOSTS: nacos:8848,rocketmq-namesrv:9876
    depends_on:
      nacos:
        condition: service_healthy
      rocketmq-namesrv:
        condition: service_healthy
      rocketmq-broker:
        condition: service_healthy

  lifeos-behavior-service:
    build:
      context: ./lifeos-backend
      dockerfile: Dockerfile
      args:
        SERVICE_MODULE: lifeos-behavior-service
    container_name: lifeos-behavior-service
    environment:
      LIFEOS_BEHAVIOR_SERVICE_PORT: 8085
      MYSQL_JDBC_URL: "jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-lifeos}?${MYSQL_JDBC_PARAMS:-useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai}"
      MYSQL_USERNAME: root
      MYSQL_PASSWORD: "${MYSQL_ROOT_PASSWORD:-123}"
      NACOS_SERVER_ADDR: nacos:8848
      ROCKETMQ_NAMESRV_ADDR: rocketmq-namesrv:9876
      WAIT_FOR_HOSTS: mysql:3306,nacos:8848,rocketmq-namesrv:9876
    depends_on:
      mysql:
        condition: service_healthy
      nacos:
        condition: service_healthy
      rocketmq-namesrv:
        condition: service_healthy
      rocketmq-broker:
        condition: service_healthy

  lifeos-admin-service:
    build:
      context: ./lifeos-backend
      dockerfile: Dockerfile
      args:
        SERVICE_MODULE: lifeos-admin-service
    container_name: lifeos-admin-service
    environment:
      LIFEOS_ADMIN_SERVICE_PORT: 8086
      MYSQL_JDBC_URL: "jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-lifeos}?${MYSQL_JDBC_PARAMS:-useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai}"
      MYSQL_USERNAME: root
      MYSQL_PASSWORD: "${MYSQL_ROOT_PASSWORD:-123}"
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DATABASE: "${REDIS_DATABASE:-0}"
      NACOS_SERVER_ADDR: nacos:8848
      ROCKETMQ_NAMESRV_ADDR: rocketmq-namesrv:9876
      LIFEOS_JWT_SECRET: "${LIFEOS_JWT_SECRET:-replace-with-a-32-plus-char-secret}"
      LIFEOS_JWT_EXPIRATION_MS: "${LIFEOS_JWT_EXPIRATION_MS:-86400000}"
      LIFEOS_RESET_SCRIPT_PATH: /app/reset_test_data.sql
      LIFEOS_ADMIN_DEFAULT_USERNAME: "${LIFEOS_ADMIN_DEFAULT_USERNAME:-admin}"
      LIFEOS_ADMIN_DEFAULT_PASSWORD: "${LIFEOS_ADMIN_DEFAULT_PASSWORD:-AdminPass123456}"
      LIFEOS_ADMIN_DEFAULT_DISPLAY_NAME: "${LIFEOS_ADMIN_DEFAULT_DISPLAY_NAME:-LifeOS Admin}"
      LIFEOS_ADMIN_DEFAULT_EMAIL: "${LIFEOS_ADMIN_DEFAULT_EMAIL:-admin@lifeos.local}"
      LIFEOS_FEISHU_BASE_URL: "${LIFEOS_FEISHU_BASE_URL:-https://open.feishu.cn/open-apis}"
      LIFEOS_FEISHU_APP_ID: "${LIFEOS_FEISHU_APP_ID:-}"
      LIFEOS_FEISHU_APP_SECRET: "${LIFEOS_FEISHU_APP_SECRET:-}"
      WAIT_FOR_HOSTS: mysql:3306,redis:6379,nacos:8848,rocketmq-namesrv:9876
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      nacos:
        condition: service_healthy
      rocketmq-namesrv:
        condition: service_healthy
      rocketmq-broker:
        condition: service_healthy
    volumes:
      - ./lifeos-backend/db/seeds/reset_test_data.sql:/app/reset_test_data.sql:ro

  lifeos-gateway:
    build:
      context: ./lifeos-backend
      dockerfile: Dockerfile
      args:
        SERVICE_MODULE: lifeos-gateway
    container_name: lifeos-gateway
    environment:
      LIFEOS_GATEWAY_PORT: 8080
      REDIS_HOST: redis
      REDIS_PORT: 6379
      NACOS_SERVER_ADDR: nacos:8848
      LIFEOS_JWT_SECRET: "${LIFEOS_JWT_SECRET:-replace-with-a-32-plus-char-secret}"
      LIFEOS_JWT_EXPIRATION_MS: "${LIFEOS_JWT_EXPIRATION_MS:-86400000}"
      WAIT_FOR_HOSTS: redis:6379,nacos:8848
    depends_on:
      redis:
        condition: service_healthy
      nacos:
        condition: service_healthy
      lifeos-user-service:
        condition: service_started
      lifeos-task-service:
        condition: service_started
      lifeos-note-service:
        condition: service_started
      lifeos-ai-service:
        condition: service_started
      lifeos-behavior-service:
        condition: service_started
      lifeos-admin-service:
        condition: service_started
    ports:
      - "${LIFEOS_GATEWAY_PORT:-8080}:8080"

  lifeos-web:
    build:
      context: ./lifeos-web
      dockerfile: Dockerfile
    container_name: lifeos-web
    depends_on:
      lifeos-gateway:
        condition: service_started
    ports:
      - "${LIFEOS_WEB_PORT:-5173}:80"

  lifeos-admin-web:
    build:
      context: ./admin-web
      dockerfile: Dockerfile
    container_name: lifeos-admin-web
    depends_on:
      lifeos-gateway:
        condition: service_started
    ports:
      - "${LIFEOS_ADMIN_WEB_PORT:-5174}:80"

volumes:
  lifeos_mysql_data:
  lifeos_redis_data:
  lifeos_nacos_logs:
  lifeos_nacos_data:
  lifeos_rocketmq_namesrv_logs:
  lifeos_rocketmq_broker_logs:
  lifeos_rocketmq_broker_store:
