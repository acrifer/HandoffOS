spring:
  application:
    name: lifeos-monolith

  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:lifeos}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          batch_size: 20

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 0
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 2

server:
  port: 8080
  servlet:
    context-path: /api

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:your-secret-key-must-be-at-least-32-characters-long}
  expiration: 86400000  # 24 hours in milliseconds

# AI Configuration
ai:
  base-url: ${AI_BASE_URL:https://api.deepseek.com}
  api-key: ${AI_API_KEY:}
  model: ${AI_MODEL:deepseek-chat}
  embedding-model: ${AI_EMBEDDING_MODEL:text-embedding-3-small}
  embedding-dimensions: 1536

# Feishu Configuration (for Handoff Skill)
feishu:
  app-id: ${FEISHU_APP_ID:}
  app-secret: ${FEISHU_APP_SECRET:}
  base-url: ${FEISHU_BASE_URL:https://open.feishu.cn/open-apis}
  chat-history-limit: ${FEISHU_CHAT_HISTORY_LIMIT:80}
  demo-fallback-enabled: ${FEISHU_DEMO_FALLBACK_ENABLED:false}
  bot-enabled: ${FEISHU_BOT_ENABLED:false}
  bot-long-connection-enabled: ${FEISHU_BOT_LONG_CONNECTION_ENABLED:false}
  bot-verification-token: ${FEISHU_BOT_VERIFICATION_TOKEN:}
  bot-encrypt-key: ${FEISHU_BOT_ENCRYPT_KEY:}

# Dify Configuration (for managed Knowledge + Workflow runtime)
dify:
  base-url: ${DIFY_BASE_URL:http://localhost:5001/v1}
  api-key: ${DIFY_API_KEY:}
  distill-workflow-key: ${DIFY_DISTILL_WORKFLOW_KEY:}
  ask-app-key: ${DIFY_ASK_APP_KEY:}
  demo-mode: ${DIFY_DEMO_MODE:false}

# Logging
logging:
  level:
    root: INFO
    com.lifeos: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG

# Springdoc OpenAPI
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
